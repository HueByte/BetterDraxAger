# This is the nginx config for the Docker container (nginx service in docker-compose.yml).
# It runs inside the Docker network — NOT on the host machine.
# "api" resolves to the API container via Docker's internal DNS.
#
# For the host machine nginx config (SSL termination, reverse proxy to this container),
# see nginx.vps.example.conf.

server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # REST API
    location /api/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # SignalR — WebSocket upgrade
    location /hubs/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
