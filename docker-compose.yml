services:
  api:
    build:
      context: ./src/BetterDraxAger.Api
      dockerfile: Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:5000
      JwtSettings__SecretKey: ${JWT_SECRET}
      ConnectionStrings__DefaultConnection: Data Source=/data/app.db
    volumes:
      - ./src/BetterDraxAger.Api/appsettings.json:/app/appsettings.json:ro
      - db_data:/data
    networks:
      - internal
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "${NGINX_PORT:-8080}:80"
    depends_on:
      - api
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:

volumes:
  db_data:
